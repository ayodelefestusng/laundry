services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
    restart: always
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A myproject worker -l info
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
    restart: always
    depends_on:
      - db
      - redis

  # Ensure these are defined if they aren't elsewhere
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myproject

  redis:
    image: redis:alpine
    restart: always