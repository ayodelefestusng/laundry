<tr>
    <td>
        <select 
            name="{{ form.prefix }}-category" 
            id="id_{{ form.prefix }}-category"
            hx-get="{% url 'htmx_get_services' %}"
            hx-target="#id_{{ form.prefix }}-service"
            hx-trigger="change"
            hx-swap="innerHTML"
            class="form-select"
        >
            <option value="">---------</option>
            {% for category in form.fields.category.queryset %}
                <option value="{{ category.id }}" {% if form.instance.category_id == category.id %}selected{% endif %}>
                    {{ category.name }}
                </option>
            {% endfor %}
        </select>
    </td>
    <td>
        <select 
            name="{{ form.prefix }}-service" 
            id="id_{{ form.prefix }}-service"
            hx-get="{% url 'htmx_get_service_details' 0 %}"
            hx-target="#price-delivery-{{ form.prefix }}"
            hx-trigger="change"
            hx-swap="innerHTML"
            hx-include="[name='{{ form.prefix }}-service']"
            class="form-select"
        >
            <option value="">---------</option>
            {% for service in form.fields.service.queryset %}
                <option value="{{ service.id }}" {% if form.instance.service_id == service.id %}selected{% endif %}>
                    {{ service.get_service_type_display }}
                </option>
            {% endfor %}
        </select>
    </td>
    <td>{{ form.name }}</td>
    <td>{{ form.color }}</td>
    <td colspan="2" id="price-delivery-{{ form.prefix }}">
        {% if form.instance.service %}
            {{ form.instance.service.price }}<br>{{ form.instance.service.delivery_time_days }} days
        {% else %}
            N/A<br>N/A
        {% endif %}
    </td>
    <td>
        {% if form.instance.pk %}
            {{ form.DELETE }}
        {% endif %}
    </td>
</tr>
