{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-center mb-4">Place a New Order</h2>
        <p class="text-center text-muted">Please fill out the form below to start your laundry order. We will contact you to confirm the details and provide an invoice.</p>
        
        <form method="post" class="mt-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Submit Order</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
