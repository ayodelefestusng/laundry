{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow border-danger border-top border-4 rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex p-4 mb-4">
                        <i class="fas fa-exclamation-triangle fa-3x text-danger"></i>
                    </div>
                    
                    <h3 class="fw-bold mb-3">Delete {{ model_name|title }}</h3>
                    <p class="lead text-muted mb-4">
                        Are you absolutely sure you want to delete <strong>"{{ object }}"</strong>? 
                        This action cannot be undone.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'laundry:tenant_admin_list' model_name %}" class="btn btn-light px-4">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4 fw-bold">Yes, Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
