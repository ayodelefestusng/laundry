{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h2 class="fw-bold text-dark m-0">
                    <i class="fas {% if object %}fa-edit{% else %}fa-plus{% endif %} text-primary me-2"></i>
                    {% if object %}Edit{% else %}Create{% endif %} {{ model_name|title }}
                </h2>
                <a href="{% url 'laundry:tenant_admin_list' model_name %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back to List</a>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-flex justify-content-end mt-4">
                            <a href="{% url 'laundry:tenant_admin_list' model_name %}" class="btn btn-light me-3">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4 fw-bold">Save {{ model_name|title }}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<!-- Support Select2 Multiple Select Native out of the Box -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('select').each(function() {
            let config = {
                width: '100%',
                placeholder: "Search and select..."
            };
            if ($(this).attr('multiple')) {
                config.allowClear = true;
                // Add Quick "Select All / Clear All" buttons for ManyToMany
                const btnHtml = `<div class="mb-2"><button type="button" class="btn btn-sm btn-outline-primary select-all-btn me-2">Select All</button><button type="button" class="btn btn-sm btn-outline-danger clear-all-btn">Clear All</button></div>`;
                $(this).before(btnHtml);
                
                let selectElement = $(this);
                $(this).prev().find('.select-all-btn').click(function() {
                    let options = selectElement.find('option');
                    options.prop('selected', true);
                    selectElement.trigger('change');
                });
                $(this).prev().find('.clear-all-btn').click(function() {
                    let options = selectElement.find('option');
                    options.prop('selected', false);
                    selectElement.trigger('change');
                });
            }
            $(this).select2(config);
        });
    });
</script>
{% endblock %}
{% endblock %}
