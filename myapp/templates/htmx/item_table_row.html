<tr id="item-row-{{ item.id }}">
    <td>{{ item.package.category.name }}</td>
    <td>{{ item.package.service_type.name }}</td>
    <td>{{ item.name }}</td>
    <td>
        {% if item.color %}
            <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:{{ item.color.hex_code }};border:1px solid #ccc;vertical-align:middle;margin-right:4px;"></span>
        {% endif %}
        {{ item.color_display }}
    </td>
    <td>&#8358;{{ item.price|floatformat:2 }}<br><small class="text-muted">{{ item.delivery_time_days }} days</small></td>
    <td class="text-center fw-bold">{{ item.quantity }}</td>
    <td class="fw-semibold text-success">&#8358;{{ item.effective_price|floatformat:2 }}</td>
    <td>
        <button class="btn btn-sm btn-info me-1"
            hx-get="{% url 'laundry:htmx_edit_item' item.id %}"
            hx-target="#item-row-{{ item.id }}"
            hx-swap="outerHTML">
            Edit
        </button>
        <button class="btn btn-sm btn-danger"
            hx-delete="{% url 'laundry:htmx_delete_item' item.id %}"
            hx-confirm="Are you sure you want to delete this item?"
            hx-target="#item-row-{{ item.id }}"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
            Delete
        </button>
    </td>
</tr>
