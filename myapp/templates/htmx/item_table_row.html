{% load humanize %}
<tr id="item-row-{{ item.id }}" class="align-middle border-bottom">
    <td class="fw-medium text-dark">{{ item.package.category.name }}</td>
    <td><span class="badge bg-light text-dark border fw-normal">{{ item.package.service_type.name }}</span></td>
    <td class="text-secondary">{{ item.name }}</td>
    <td>
        <div class="d-flex align-items-center">
            {% if item.color %}
                <span class="color-swatch-sm me-2 shadow-sm" style="background:{{ item.color.hex_code }};" title="{{ item.color.name }}"></span>
            {% endif %}
            <span class="small fw-semibold">{{ item.color_display }}</span>
        </div>
    </td>
    <td>
        <div class="fw-normal text-dark">₦{{ item.price|intcomma }}</div>
        <div class="text-muted smaller"><i class="far fa-clock me-1"></i>{{ item.delivery_time_days }} Days</div>
    </td>
    <td class="text-center"><span class="badge rounded-pill bg-light text-primary border px-3">{{ item.quantity }}</span></td>
    <td class="text-end fw-bold text-success fs-7">₦{{ item.effective_price|intcomma }}</td>
    <td class="text-end">
        <div class="btn-group shadow-sm rounded-pill overflow-hidden">
            <button class="btn btn-info text-white px-3 border-0 hover-lift"
                hx-get="{% url 'laundry:htmx_edit_item' item.id %}"
                hx-target="#item-row-{{ item.id }}"
                hx-swap="outerHTML"
                title="Edit Item">
                <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-danger text-white px-3 border-0 hover-lift"
                hx-delete="{% url 'laundry:htmx_delete_item' item.id %}"
                hx-confirm="Remove this item ({{ item.name }}) from the order?"
                hx-target="#item-row-{{ item.id }}"
                hx-swap="outerHTML"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                title="Delete Item">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </td>
</tr>

<style>
.color-swatch-sm {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.1);
}
.smaller { font-size: 0.75rem; }
.hover-lift:hover { transform: translateY(-2px); transition: transform 0.2s; }
</style>
