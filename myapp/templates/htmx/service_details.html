{% load humanize %}
{% if package %}
    <div class="p-2 border rounded-3 bg-white shadow-sm animate-fade-in">
        <div class="row g-0 align-items-center">
            <div class="col-6 border-end text-center">
                <div class="small text-muted fw-semibold smaller text-uppercase">Price</div>
                <div class="fw-bold text-success font-monospace">₦{{ package.price|intcomma }}</div>
            </div>
            <div class="col-6 ps-2 text-center">
                <div class="small text-muted fw-semibold smaller text-uppercase">Turnaround</div>
                <div class="fw-bold text-primary font-monospace">{{ package.delivery_time_days }} Days</div>
            </div>
        </div>
    </div>
{% else %}
    <div class="p-2 border rounded-3 bg-light text-center opacity-50">
        <i class="fas fa-info-circle me-1"></i> <span class="smaller">N/A</span>
    </div>
{% endif %}
