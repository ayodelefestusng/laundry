<tr>
    <td>
        <select 
            name="category" 
            id="id_category"
            hx-get="{% url 'laundry:htmx_get_package_options' %}"
            hx-target="#id_service"
            hx-trigger="change"
            hx-swap="innerHTML"
            class="form-select"
        >

            <option value="">---------</option>
            {% for package in packages %}
                <option value="{{ package.id }}">{{ package.category.name }}</option>
            {% endfor %}
        </select>
    </td>
    <td>
        <select 
            name="service" 
            id="id_service"
            hx-get="{% url 'laundry:htmx_get_package_details' %}"
            hx-target="#price-delivery-details"
            hx-trigger="change"
            hx-swap="innerHTML"
            class="form-select"
        >
            <option value="">---------</option>
        </select>
    </td>
    <td>
        {{ form.name }}
    </td>
    <td>
        {{ form.color }}
    </td>
    <td colspan="2" id="price-delivery-details">    
        {#  N/A<br>N/A  #}
    </td>
</tr>
