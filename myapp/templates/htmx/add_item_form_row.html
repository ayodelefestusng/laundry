<tr class="align-middle bg-white">
    <td style="width: 20%;">
        <label class="small text-muted mb-1 d-block fw-semibold">Category</label>
        <select
            name="category"
            id="id_category"
            hx-get="{% url 'laundry:htmx_get_package_options' %}"
            hx-target="#id_package"
            hx-trigger="change"
            hx-swap="innerHTML"
            class="form-select select2-styled"
            hx-on:htmx:after-swap="setTimeout(function(){ $('#id_package').select2({width: '100%'}); }, 50)"
        >
            <option value="" selected disabled>Select Category</option>
            {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>
    </td>
    <td style="width: 20%;">
        <label class="small text-muted mb-1 d-block fw-semibold">Service Type</label>
        <select
            name="package"
            id="id_package"
            hx-get="{% url 'laundry:htmx_get_package_details' %}"
            hx-target="#price-delivery-details"
            hx-trigger="change"
            hx-swap="innerHTML"
            class="form-select select2-styled"
        >
            <option value="" selected disabled>Select Service</option>
        </select>
    </td>
    <td style="width: 20%;">
        <label class="small text-muted mb-1 d-block fw-semibold">Garment Name</label>
        <input type="text" name="name" class="form-control shadow-sm border-light-subtle" placeholder="e.g. White Native" required>
    </td>

    {# ── Color cell ───────────────────────────────────────────────────── #}
    <td class="align-middle" style="min-width:200px;">
        <label class="small text-muted mb-1 d-block fw-semibold">Color</label>
        <select name="color" id="id_color" class="form-select color-select-styled mb-2">
            <option value="">Select color…</option>
            {% for c in colors %}
                <option value="{{ c.id }}" data-hex="{{ c.hex_code }}">{{ c.name }}</option>
            {% endfor %}
            <option value="other" class="fw-bold text-primary">Other / Custom…</option>
        </select>
        <div id="custom-color-container" style="display:none;" class="mt-1 animate-fade-in">
            <input
                type="text"
                name="color_custom"
                id="id_color_custom"
                class="form-control form-control-sm border-primary-subtle"
                placeholder="Describe color (e.g. Teal Blue)"
            >
        </div>
    </td>

    {# ── Quantity cell ────────────────────────────────────────────────── #}
    <td class="align-middle" style="width: 10%;">
        <label class="small text-muted mb-1 d-block fw-semibold">Qty</label>
        <select name="quantity" id="id_quantity" class="form-select shadow-sm border-light-subtle">
            {% for i in quantity_range %}
                <option value="{{ i }}" {% if i == 1 %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
        </select>
    </td>

    {# ── Price / Delivery placeholder ─────────────────────────────────── #}
    <td id="price-delivery-details" class="align-middle text-muted small" style="min-width: 120px;">
        <div class="p-2 border rounded-3 bg-light text-center">
            <i class="fas fa-info-circle me-1 opacity-50"></i> <span class="smaller">Select service to see price</span>
        </div>
    </td>
</tr>

<style>
.select2-styled, .color-select-styled {
    border-radius: 8px !important;
    border: 1px solid #dee2e6 !important;
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) !important;
}
.animate-fade-in {
    animation: fadeIn 0.3s ease-in;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
.smaller { font-size: 0.7rem; }
</style>

<script>
(function () {
    // Color swatch rendering in Select2
    function formatColorOption(option) {
        if (!option.id) return option.text;
        var hex = $(option.element).data('hex');
        if (!hex) return option.text;
        return $('<span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:' + hex + ';border:1px solid rgba(0,0,0,0.1);margin-right:8px;vertical-align:middle;"></span>' + option.text + '</span>');
    }

    $('#id_color').select2({
        width: '100%',
        placeholder: 'Select color…',
        allowClear: true,
        templateResult: formatColorOption,
        templateSelection: formatColorOption,
        dropdownCssClass: 'shadow-lg border-0'
    });

    // Show/hide custom color input
    $('#id_color').on('select2:select select2:unselect select2:clear change', function () {
        var val = $(this).val();
        const container = $('#custom-color-container');
        const input = $('#id_color_custom');
        
        if (val === 'other') {
            container.slideDown(200);
            input.prop('required', true).focus();
        } else {
            container.slideUp(150);
            input.prop('required', false);
        }
    });
})();
</script>
