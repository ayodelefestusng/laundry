{% load humanize %}
<div id="order-summary-content" class="card shadow rounded-4 border-0 overflow-hidden animate-fade-in mb-4">
    <div class="card-header bg-dark text-white py-3 border-0 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 fw-bold text-uppercase smaller tracking-widest"><i class="fas fa-file-invoice-dollar me-2"></i>Live Summary</h6>
        <span class="badge bg-success rounded-pill fw-bold">Active Order</span>
    </div>
    <div class="card-body p-3 p-lg-4">
        <div class="row g-3 g-lg-4 text-center align-items-center">
            <div class="col-4 col-lg-2">
                <div class="text-muted smallest text-uppercase fw-bold mb-1">Items</div>
                <div class="h5 fw-bold mb-0 text-dark">{{ summary.total_items }}</div>
            </div>
            <div class="col-4 col-lg-2 border-start border-light">
                <div class="text-muted smallest text-uppercase fw-bold mb-1">Subtotal</div>
                <div class="fw-bold mb-0 text-dark small">₦{{ summary.subtotal|intcomma }}</div>
            </div>
            <div class="col-4 col-lg-2 border-start border-light">
                <div class="text-muted smallest text-uppercase fw-bold mb-1">Shipping</div>
                <div class="fw-bold mb-0 text-primary small">₦{{ summary.shipping_price|intcomma }}</div>
            </div>
            <div class="col-12 col-lg-3 border-start-lg border-light py-2 px-lg-3">
                <div class="bg-success bg-opacity-10 rounded-3 p-3 border border-success border-opacity-25 shadow-sm">
                    <div class="text-success smallest text-uppercase fw-bold mb-1">Total Due</div>
                    <div class="h4 fw-bold mb-0 text-success">₦{{ summary.total_price|intcomma }}</div>
                </div>
            </div>
            <div class="col-12 col-lg-3 border-start-lg border-light">
                <div class="text-muted smallest text-uppercase fw-bold mb-1">Estimated Delivery</div>
                <div class="fw-bold mb-0 text-primary small">
                    <i class="far fa-calendar-check me-1"></i> {{ summary.delivery_date|date:"M d, Y" }}
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.tracking-widest { letter-spacing: 0.1em; }
.smallest { font-size: 0.65rem; }
@media (min-width: 992px) {
    .border-start-lg { border-left: 1px solid #dee2e6 !important; }
}
</style>
