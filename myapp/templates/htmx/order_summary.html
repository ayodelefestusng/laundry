{% load humanize %}
<div id="order-summary-section" class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="card-header bg-gradient bg-primary text-white py-3">
        <h5 class="mb-0 fw-bold"><i class="fas fa-receipt me-2"></i>Order Summary</h5>
    </div>
    <div class="card-body p-4">
        <div class="row g-4 text-center">
            <div class="col-md-2">
                <h6 class="text-muted small text-uppercase fw-bold mb-1">Items</h6>
                <h6 class="fw-bold mb-0">{{ summary.total_items }}</h6>
            </div>
            <div class="col-md-2">
                <h6 class="text-muted small text-uppercase fw-bold mb-1">Subtotal</h6>
                <h6 class="fw-bold mb-0 text-dark">₦{{ summary.subtotal|intcomma }}</h6>
            </div>
            <div class="col-md-2">
                <h6 class="text-muted small text-uppercase fw-bold mb-1">Shipping</h6>
                <h6 class="fw-bold mb-0 text-primary">₦{{ summary.shipping_price|intcomma }}</h6>
            </div>
            <div class="col-md-3">
                <h6 class="text-muted small text-uppercase fw-bold mb-1 text-primary">Total Amount</h6>
                <h6 class="fw-bold mb-0 text-success">₦{{ summary.total_price|intcomma }}</h6>
            </div>
            <div class="col-md-3">
                <h6 class="text-muted small text-uppercase fw-bold mb-1">Est. Delivery</h6>
                <h6 class="fw-bold mb-0 text-primary small">{{ summary.delivery_date|date:"M d, Y" }}</h6>
            </div>
        </div>
    </div>
</div>
