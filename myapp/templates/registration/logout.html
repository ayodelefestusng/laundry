{% extends "base.html" %}

{% block content %}
<style>
:root {
  --primary-color: {{ request.tenant.attribute.primary_color|default:"#4f46e5" }};
  --secondary-color: {{ request.tenant.attribute.secondary_color|default:"#6366f1" }};
  --font-family: {{ request.tenant.attribute.font_family|default:"'Inter', sans-serif"|safe }};
}

body {
  font-family: var(--font-family);
  background: linear-gradient(135deg, rgba(230,240,255,1) 0%, rgba(255,255,255,1) 100%);
}

.login-card {
  border-radius: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.4) !important;
}

.btn-primary {
  background-color: var(--primary-color) !important;
  border-color: var(--primary-color) !important;
  border-radius: 10px;
  font-weight: 600;
  transition: all 0.3s;
}

.btn-primary:hover {
  background-color: var(--secondary-color) !important;
  border-color: var(--secondary-color) !important;
  transform: translateY(-2px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.1);
}

.text-primary {
  color: var(--primary-color) !important;
}
</style>

<div class="container-fluid py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card login-card border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 64px; height: 64px;">
                            <i class="fas fa-sign-out-alt fa-2x"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Logged Out Successfully</h4>
                        <p class="text-muted small">You have been securely logged out. We hope to see you again soon!</p>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'laundry:login' %}" class="btn btn-primary py-2">
                            <i class="fas fa-sign-in-alt me-2"></i> Log In Again
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
