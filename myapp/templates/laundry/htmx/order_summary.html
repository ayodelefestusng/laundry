<h2>Order #{{ order.id }}</h2>
<p><strong>Status:</strong> {{ order.get_status_display }}</p>
<table>
    <thead>
        <tr>
            <th>Item</th>
            <th>Service</th>
            <th>Price</th>
            <th>Est. Delivery Time</th>
        </tr>
    </thead>
    <tbody>
        {% for item in order.items.all %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.get_service_type_display }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.delivery_time_days }} days</td>
            </tr>
        {% endfor %}
    </tbody>
</table>

<button hx-post="{% url 'accept_order' order.id %}" hx-target="#response-area" hx-swap="outerHTML">Accept</button>
<button hx-get="{% url 'htmx_comment_form' order.id %}" hx-target="#response-area" hx-swap="outerHTML">Comment</button>

<div id="response-area"></div>
