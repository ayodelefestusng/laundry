services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
    restart: always

  # Celery worker to handle background tasks like email sending
  worker:
    build: .
    command: celery -A myproject worker -l info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
    depends_on:
      - web
