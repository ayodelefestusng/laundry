services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
    restart: always

  # Celery worker/beat can be added here if needed based on the dependencies
  # worker:
  #   build: .
  #   command: celery -A myproject worker -l info
  #   env_file:
  #     - .env
  #   depends_on:
  #     - web
